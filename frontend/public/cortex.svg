  <path d="M181 76C165 60 142 51 116 51C62 51 19 94 19 148s43 97 97 97c26 0 49-9 65-25" fill="none" stroke="url(#aurora)" stroke-width="17" stroke-linecap="round" />

  <path d="M181 76L165 92M188 181l-22-16" fill="none" stroke="url(#aurora)" stroke-width="5" stroke-linecap="round" opacity="0.74" />
  <circle cx="185" cy="76" r="8" fill="#5de4c5" filter="url(#glow)" />
  <circle cx="188" cy="181" r="8" fill="#aa82ff" filter="url(#glow)" />

  <path d="M105 91h55c13 0 23 10 23 23v25c0 13-10 23-23 23h-30l-18 20 2-20h-9c-13 0-23-10-23-23v-25c0-13 10-23 23-23Z" fill="#06101b" opacity="0.46" filter="url(#shadow)" />
  <path d="M105 86h55c13 0 23 10 23 23v25c0 13-10 23-23 23h-30l-18 20 2-20h-9c-13 0-23-10-23-23v-25c0-13 10-23 23-23Z" fill="url(#core)" />
  <circle cx="111" cy="121" r="6" fill="#18324c" />
  <circle cx="132" cy="121" r="6" fill="#245174" />
  <circle cx="153" cy="121" r="6" fill="#3c5e9a" />
  <path d="M108 143c12 7 27 7 39 0" fill="none" stroke="#6a83b1" stroke-width="4" stroke-linecap="round" opacity="0.62" />
