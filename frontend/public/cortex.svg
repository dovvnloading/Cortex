<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Cortex</title>
  <desc id="desc">A luminous chat core surrounded by a local network orbit.</desc>
  <defs>
    <linearGradient id="surface" x1="32" y1="20" x2="224" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18263d" />
      <stop offset="0.52" stop-color="#101b2e" />
      <stop offset="1" stop-color="#0b111f" />
    </linearGradient>
    <linearGradient id="aurora" x1="35" y1="54" x2="220" y2="211" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5de4c5" />
      <stop offset="0.48" stop-color="#67b6ff" />
      <stop offset="1" stop-color="#aa82ff" />
    </linearGradient>
    <linearGradient id="core" x1="87" y1="93" x2="170" y2="171" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7fffd" />
      <stop offset="0.58" stop-color="#c9f8ee" />
      <stop offset="1" stop-color="#a7caff" />
    </linearGradient>
    <linearGradient id="edge" x1="30" y1="22" x2="228" y2="234" gradientUnits="userSpaceOnUse">
      <stop stop-color="#72e7d0" stop-opacity="0.44" />
      <stop offset="0.5" stop-color="#75baff" stop-opacity="0.1" />
      <stop offset="1" stop-color="#a87cff" stop-opacity="0.44" />
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientTransform="translate(129 128) rotate(90) scale(104)">
      <stop stop-color="#6edfc9" stop-opacity="0.2" />
      <stop offset="0.62" stop-color="#608dff" stop-opacity="0.08" />
      <stop offset="1" stop-color="#0b111f" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#02050b" flood-opacity="0.52" />
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="#090e18" />
  <rect x="8" y="8" width="240" height="240" rx="50" fill="url(#surface)" stroke="url(#edge)" stroke-width="3" />
  <rect x="12" y="12" width="232" height="232" rx="46" fill="url(#halo)" />

